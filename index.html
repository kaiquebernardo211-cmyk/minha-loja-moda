<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLE.CO | Moda 2026</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 1000; text-decoration: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <a href="https://wa.me" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-600 italic tracking-tighter">STYLE.CO</h1>
        </div>
    </nav>
    <header class="relative h-[400px] flex items-center justify-center bg-slate-900 text-white text-center px-4">
        <img src="https://unsplash.com" class="absolute w-full h-full object-cover opacity-50">
        <div class="relative z-10">
            <h2 class="text-4xl font-bold mb-2 uppercase">Nova Coleção</h2>
            <p class="mb-6 italic">Tendências exclusivas para você</p>
            <a href="#colecao" class="bg-white text-black px-8 py-3 font-bold uppercase shadow-xl">Explorar</a>
        </div>
    </header>
    <section id="colecao" class="py-12 container mx-auto px-6">
        <div class="grid grid-cols-1 gap-10">
            <div class="bg-white rounded-2xl shadow-lg p-4 text-center">
                <img src="https://unsplash.com" class="w-full h-80 object-cover rounded-xl mb-4">
                <h4 class="font-bold uppercase">Sobretudo Minimalist</h4>
                <p class="text-indigo-600 font-black">R$ 499,00</p>
                <button class="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl font-bold">Comprar</button>
            </div>
            <div class="bg-white rounded-2xl shadow-lg p-4 text-center">
                <img src="https://unsplash.com" class="w-full h-80 object-cover rounded-xl mb-4">
                <h4 class="font-bold uppercase">Vestido Silk Floral</h4>
                <p class="text-indigo-600 font-black">R$ 289,90</p>
                <button class="w-full mt-4 bg-slate-900 text-white py-3 rounded-xl font-bold">Comprar</button>
            </div>
        </div>
    </section>
</body>
</html>
