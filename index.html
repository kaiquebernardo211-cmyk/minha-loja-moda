<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLE.CO | Moda 2026</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 1000; text-decoration: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <a href="https://wa.me" class="whatsapp-float" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-600 italic tracking-tighter">STYLE.CO</h1>
            <div class="space-x-4 font-bold text-sm uppercase">
                <a href="#colecao" class="text-slate-600">Coleção</a>
            </div>
        </div>
    </nav>
    <header class="relative h-[450px] flex items-center justify-center bg-slate-900 text-white px-4 text-center">
        <img src="https://unsplash.com" class="absolute w-full h-full object-cover opacity-50">
        <div class="relative z-10">
            <h2 class="text-5xl font-bold mb-4 uppercase tracking-tighter">Nova Coleção</h2>
            <p class="text-xl mb-8 font-light italic">Tendências exclusivas para você</p>
            <a href="#colecao" class="bg-white text-black px-10 py-4 font-bold uppercase hover:bg-indigo-600 hover:text-white transition shadow-xl">Explorar</a>
        </div>
    </header>
    <section id="colecao" class="py-20 container mx-auto px-6">
        <h3 class="text-3xl font-bold text-center mb-16 uppercase tracking-widest">Destaques</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            <div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100 p-4 text-center">
                <img src="https://unsplash.com" class="w-full h-96 object-cover rounded-xl mb-6">
                <h4 class="font-bold text-lg">Sobretudo Minimalist</h4>
                <p class="text-indigo-600 font-black text-xl mt-2">R$ 499,00</p>
                <button class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold">Comprar</button>
            </div>
            <div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100 p-4 text-center">
                <img src="https://unsplash.com" class="w-full h-96 object-cover rounded-xl mb-6">
                <h4 class="font-bold text-lg">Vestido Silk Floral</h4>
                <p class="text-indigo-600 font-black text-xl mt-2">R$ 289,90</p>
                <button class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold">Comprar</button>
            </div>
            <div class="bg-white rounded-2xl overflow-hidden shadow-lg border border-slate-100 p-4 text-center">
                <img src="https://unsplash.com" class="w-full h-96 object-cover rounded-xl mb-6">
                <h4 class="font-bold text-lg">Look Fashion Street</h4>
                <p class="text-indigo-600 font-black text-xl mt-2">R$ 159,00</p>
                <button class="w-full mt-6 bg-slate-900 text-white py-3 rounded-xl font-bold">Comprar</button>
            </div>
        </div>
    </section>
    <footer class="bg-white py-12 border-t text-center">
        <p class="font-black text-xl text-indigo-600 mb-2 italic">STYLE.CO</p>
        <p class="text-slate-400 text-sm italic">© 2026 - Todos os direitos reservados</p>
    </footer>
</body>
</html>
