<!DOCTYPE html>

    <!-- Tailwind + Fontes + Ícones -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Manrope', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
        html { scroll-behavior: smooth; }

        /* Efeito glass no menu */
       .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Animação do banner */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
       .animate-fadeUp { animation: fadeUp 0.8s ease-out forwards; }

       .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px;
            background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 2px 2px 15px rgba(0,0,0,0.3);
            z-index: 1000; transition: all 0.3s;
        }
       .whatsapp-float:hover { transform: scale(1.1) rotate(10deg); }
    </style>
</head>
